<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static',
    filename='images/favicon.png') }}">
    
</head>
<body>

<h1>🔐 Forgot Password</h1>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Enter Your Email"
        required>

    <button type="submit">
        Send OTP
    </button>

</form>

</body>
</html>
