<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

<h1>🔐 Reset Password</h1>

<form method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <input
        type="password"
        name="new_password"
        placeholder="New Password"
        required>

    <button type="submit">
        Reset Password
    </button>

</form>

</body>
</html>
