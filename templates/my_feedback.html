<br><br>
<h1>My Feedback</h1>

{% for feedback in feedbacks %}

<div class="project-card">

    <h3>📝 Your Feedback</h3>

    <p>
        {{ feedback.message }}
    </p>

    <hr>

    <h3>💬 Admin Reply</h3>

    <p>
        {{ feedback.reply if feedback.reply else "No reply yet" }}
    </p>

</div>

{% endfor %}
