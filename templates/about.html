<!DOCTYPE html>
<html>
<head>

    <title>About Me</title>

    <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static',
    filename='images/favicon.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<div class="container">

    <section class="about">

    <h1>About Me</h1>

    <form method="POST">

        <label>Bio</label>

        <textarea
            name="bio"
            class="form-control"
            rows="4"
            required>{{ about.bio if about else "" }}</textarea>

        <br>

        <label>Career Goal</label>

        <textarea
            name="career_goal"
            class="form-control"
            rows="3"
            required>{{ about.career_goal if about else "" }}</textarea>

        <br>

        <label>Hobbies</label>

        <textarea
            name="hobbies"
            class="form-control"
            rows="3"
            required>{{ about.hobbies if about else "" }}</textarea>

        <br>

        <button
            type="submit"
            class="btn btn-primary">

            Save About Me

        </button>

    </form>

</section>
</div>

</body>
</html>
