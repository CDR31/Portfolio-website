<!DOCTYPE html>
<html>
<head>
    <title>{{ user.name }}</title>
    <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static',
    filename='images/favicon.png') }}">
</head>


<body>

    

<h1>{{ user.name }}</h1>

{% if user.profile_photo %}

<img
src="{{ url_for(
'static',
filename='profile_photos/' + user.profile_photo
) }}"
width="200">

{% endif %}

<p>

Email:
{{ user.email }}

</p>

</body>

</html>
