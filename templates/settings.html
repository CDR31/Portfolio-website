<!DOCTYPE html>
<html>
<head>
<title>Settings</title>
<link
rel="icon"
type="image/png"
href="{{ url_for('static',
filename='images/favicon.png') }}">

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/style.css') }}">

</head>

<body>

<div class="container">

<a href="/dashboard" class="btn page-top-btn">
    🏠 Dashboard
</a>

<hr>

<h1>⚙️ Settings</h1>

<div class="dashboard-stats">

    <div class="project-card">

        <h2>🔒 Change Password</h2>

        <form action="/change_password" method="POST">

            <input
            type="password"
            name="old_password"
            placeholder="Current Password">

            <input
            type="password"
            name="new_password"
            placeholder="New Password">

            <input
            type="password"
            name="confirm_password"
            placeholder="Confirm Password">

            <button type="submit">
                Change Password
            </button>

        </form>

    </div>

    <div class="project-card">

        <h2>📧 Change Email</h2>

        <form action="/change_email" method="POST">

            <input
            type="email"
            name="new_email"
            placeholder="New Email">

            <button type="submit">
                Change Email
            </button>

        </form>

    </div>

    <div class="project-card">

        <h2>🟡 Account Management</h2>

        <a href="/deactivate_account"
           class="btn">

            Deactivate Account

        </a>

    </div>

    <div class="project-card">

        <h2>⚠️ Danger Zone</h2>

        <a href="/confirm_delete_account"
           class="btn">

            Delete Account

        </a>

    </div>

</div>

</div>

</body>

</html>
