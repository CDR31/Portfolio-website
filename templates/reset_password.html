<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static',
    filename='images/favicon.png') }}">
</head>
<body>

<h1>🔑 Create New Password</h1>

<form method="POST">

    <input
        type="password"
        name="password"
        placeholder="New Password"
        required>

    <button type="submit">
        Save Password
    </button>

</form>

</body>
</html>
