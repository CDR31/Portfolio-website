<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>
    <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static',
    filename='images/favicon.png') }}">
</head>
<body>

<h1>Upload Resume</h1>

<form method="POST"
      enctype="multipart/form-data">

    <input
        type="file"
        name="resume"
        accept=".pdf"
        required>

    <button type="submit">
        Upload Resume
    </button>

</form>

</body>
</html>
