<!DOCTYPE html>
<html>
<head>

    <title>Contact Me</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>


    {% if session.get("user_id") %}
    <a href="/dashboard" class="btn page-top-btn">
        🏠 Dashboard
    </a>
    {% endif %}

    <section class="hero-banner">

    <h1>📧 Contact Me</h1>

    <p>
        Feel free to contact me for projects,
        collaboration or feedback.
    </p>

</section>

<div class="form-container">

    <div class="form-card">

        <form method="POST">

            <input
                type="hidden"
                name="owner_id"
                value="{{ request.args.get('user') }}">

            <input
                type="text"
                name="name"
                placeholder="Your Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Your Email"
                required>

            <textarea
                name="message"
                rows="5"
                placeholder="Your Message"
                required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

        <hr>

        <div class="contact-info">

            <h2>My Contact Information</h2>

            <p>
                Email:
                <a href="mailto:{{ owner.email }}"
                    class="btn">
                    📩 Email
                </a>

            
            </p>

            <p>
                LinkedIn:
                <a href="{{ social.linkedin }}"
                    target="_blank"
                    class="btn">
                    🔗 LinkedIn
                </a>

            </p>

            <p>
                GitHub:
                <a href="{{ social.github }}"
                    target="_blank"
                    class="btn">
                    🤖 GitHub
                </a>

            </p>

        </div>

    </div>

</div>

<footer>

    <hr>

    <h3>
        Student Service Portal
    </h3>

    <p>
        Built with Flask, SQLAlchemy and Python
    </p>

</footer>

</body>
</html>
