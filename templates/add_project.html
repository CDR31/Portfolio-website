<!DOCTYPE html>
<html>
<head>

    <title>Add Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <a href="/dashboard" class="btn page-top-btn">
    🏠 Dashboard
    </a>

<hr>

<div class="form-container">

    <div class="form-card">

        <h1>Add Project</h1>

        <form method="POST">

            <input
                type="text"
                name="title"
                placeholder="Project Title"
                required>

            <input
                type="text"
                name="technology"
                placeholder="Technology Used">

            <textarea
                name="description"
                placeholder="Project Description"
                rows="5"></textarea>

            <input
                type="text"
                name="github_link"
                placeholder="GitHub Link">

            <label>
                <input
                    type="checkbox"
                    name="featured">

                ⭐ Featured Project
            </label>

            <button type="submit">
                Save Project
            </button>

        </form>

    </div>

</div>

</body>
</html>
