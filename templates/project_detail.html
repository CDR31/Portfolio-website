<!DOCTYPE html>
<html>
<head>

    <title>{{ project.title }}</title>
    <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static',
    filename='images/favicon.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="project-card mt-5">

        <h1>
            {{ project.title }}
        </h1>

        <hr>

        <h4>
            Technology Used
        </h4>

        <p>
            <strong>Technology:</strong>
            {{ project.technology }}
        </p>

        <p>

            <strong>Created:</strong>

            {{ project.created_at }}

        </p>

        <h4>
            Project Description
        </h4>

        <p>
            {{ project.description }}
        </p>

        <h4>
            GitHub Repository
        </h4>

        <p>

            <a href="{{ project.github_link }}"
               target="_blank">

                Open GitHub Repository

            </a>

        </p>

        <br>

        <a href="/projects"
           class="btn btn-primary">

            Back to Projects

        </a>

    </div>

</div>

</body>
</html>
