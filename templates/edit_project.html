<!DOCTYPE html>
<html>
<head>

    <title>Edit Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="form-container">

    <div class="form-card">

        <h1>Edit Project</h1>

        <form method="POST">

            <input
                type="text"
                name="title"
                value="{{ project.title }}"
                required>

            <input
                type="text"
                name="technology"
                value="{{ project.technology }}">

            <textarea
                name="description"
                rows="5">{{ project.description }}</textarea>

            <input
                type="text"
                name="github_link"
                value="{{ project.github_link }}">

            <button type="submit">
                Update Project
            </button>

        </form>

    </div>

</div>

</body>
</html>
