<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="form-container">

    <div class="form-card">

        <h1>Welcome Back</h1>

        <p>

        Login to manage your portfolio,
        projects, certificates and resume.

        </p>

        <hr>
        <h3>What Can You Do?</h3>

        <ul>

        <li>✅ Manage Projects</li>

        <li>✅ Upload Resume</li>

        <li>✅ Store Certificates</li>

        <li>✅ Update Skills</li>

        <li>✅ Manage Education</li>

        <li>✅ Track Achievements</li>

        </ul>

        <hr>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <hr>

        <p>

        Don't have an account?

        <a href="/register">

        Register Here

        </a>

        </p>

    </div>

</div>

</body>
</html>
